# 文件路径: WheatAgent/configs/wheat_disease.yaml

# 1. 数据集路径 (请根据实际绝对路径或相对路径修改)
path: ../datasets/wheat_data  # 数据集根目录
train: images/train           # 训练集图片 (相对于path)
val: images/val               # 验证集图片 (相对于path)

# 2. 类别定义 (与 main.py 中的映射保持一致)
names:
  0: 蚜虫 (Aphids)
  1: 螨虫 (Mites)
  2: 茎蝇 (Stem Fly)
  3: 锈病 (Rust - General)
  4: 茎锈病 (Stem Rust)
  5: 叶锈病 (Leaf Rust)
  6: 条锈病 (Stripe Rust)
  7: 黑粉病 (Smuts)
  8: 根腐病 (Common Root Rot)
  9: 叶斑病 (Spot Blotch)
  10: 小麦爆发病 (Wheat Blast)
  11: 赤霉病 (Fusarium Head Blight)
  12: 壳针孢叶斑病 (Septoria Leaf Blotch)
  13: 斑点叶斑病 (Speckled Leaf Blotch)
  14: 褐斑病 (Brown Spot)
  15: 白粉病 (Powdery Mildew)
  16: 健康 (Healthy)

# 3. 训练参数推荐
nc: 17 # 类别总数
box: 0.05  # 边框损失权重
cls: 0.5   # 分类损失权重
fliplr: 0.5 # 水平翻转增强