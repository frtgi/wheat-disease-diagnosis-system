# ============================================================
# WheatAgent 统一训练参数配置文件
# 基于多模态特征融合的小麦病害诊断智能体
# 针对RTX 3050 4GB显存优化 v2.0
# ============================================================

# ==================== 基础训练参数 ====================
epochs: 100
imgsz: 640

# ==================== Batch配置 (4GB显存优化) ====================
# 4GB显存最优配置: batch=8-12
batch: 8

# ==================== 优化器参数 ====================
optimizer: AdamW
lr0: 0.002
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8

# ==================== 损失函数权重 (CIoU优化) ====================
box: 7.5
cls: 0.5
dfl: 1.5
iou: 0.7

# ==================== 数据增强参数 ====================
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 15.0
translate: 0.1
scale: 0.9
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.2
copy_paste: 0.1
erasing: 0.4
crop_fraction: 1.0

# ==================== 显存优化参数 ====================
cache: false
rect: false
amp: true

# ==================== 训练策略 ====================
patience: 15
save_period: 10

# ==================== 验证和评估 ====================
val: true
plots: true

# ==================== 设备配置 ====================
device: 0
workers: 4

# ==================== 三阶段训练策略 (4GB显存优化) ====================
phases:
  phase1:
    name: "快速收敛阶段"
    epochs: 30
    batch: 8
    lr0: 0.01
    mosaic: 1.0
    mixup: 0.2
    description: "高学习率快速收敛，强数据增强"
  phase2:
    name: "稳定优化阶段"
    epochs: 40
    batch: 8
    lr0: 0.005
    mosaic: 0.5
    mixup: 0.1
    description: "中等学习率稳定优化，适度数据增强"
  phase3:
    name: "精细调整阶段"
    epochs: 30
    batch: 4
    lr0: 0.001
    mosaic: 0.0
    mixup: 0.0
    description: "低学习率精细调整，关闭数据增强"

# ==================== 模型配置 ====================
model:
  base: yolov8n.pt
