# v8 最终优化训练配置
# 目标: mAP@50 >= 95%
# 基础模型: wheat_disease_v5_optimized_phase2 (mAP@50 = 92.68%)

model:
  base: "models/wheat_disease_v5_optimized_phase2/weights/best.pt"
  input_size: 800

training:
  epochs: 150
  batch: 4
  imgsz: 800
  device: 0
  workers: 4
  amp: true
  cache: false
  rect: false
  patience: 50
  save_period: 10

optimizer:
  type: "AdamW"
  lr0: 0.0005
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 5
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

loss:
  box: 7.5
  cls: 0.5
  dfl: 1.5

augmentation:
  hsv_h: 0.01
  hsv_s: 0.5
  hsv_v: 0.3
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 0.5
  mixup: 0.1
  copy_paste: 0.0
  erasing: 0.0

evaluation:
  conf_threshold: 0.001
  iou_threshold: 0.7
  max_det: 300

phases:
  - name: "fine_tune"
    epochs: 50
    lr_factor: 0.1
    mosaic: 0.5
    mixup: 0.1
    description: "精细调整阶段，从最佳模型继续优化"
  - name: "ultra_fine"
    epochs: 50
    lr_factor: 0.05
    mosaic: 0.3
    mixup: 0.05
    description: "超精细调整阶段"
  - name: "final_polish"
    epochs: 50
    lr_factor: 0.01
    mosaic: 0.0
    mixup: 0.0
    description: "最终打磨阶段，关闭增强"

output:
  project: "models"
  name: "wheat_disease_v8_final"
  exist_ok: true
