# ============================================================
# WheatAgent V7 优化训练配置
# 目标: mAP@50 >= 95%
# 优化策略:
#   1. 升级到 YOLOv8m (更大模型容量)
#   2. 类别权重平衡 (解决 Stem fly 样本不足)
#   3. 梯度裁剪 (解决数值不稳定)
#   4. 优化学习率衰减策略
#   5. 调整损失权重
# ============================================================

# 模型配置
# 使用本地已有的最佳模型继续训练 (网络无法下载 yolov8m)
model:
  base: models/wheat_disease_v6_high_accuracy/phase4_fine_tune/train/weights/best.pt
  input_size: 640

# 训练基础参数
training:
  epochs: 200
  batch: 4
  imgsz: 640
  device: 0
  workers: 4
  amp: true
  cache: false
  rect: false
  patience: 30
  save_period: 10

# 优化器配置
optimizer:
  type: AdamW
  lr0: 0.001
  lrf: 0.1
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 10
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

# 梯度裁剪 (解决数值不稳定)
gradient_clip: 10.0

# 损失函数权重 (优化版)
loss:
  box: 5.0
  cls: 0.8
  dfl: 1.5

# 类别权重配置 (基于样本数量反比计算)
# 计算公式: weight = median_count / class_count
# Stem fly (876) 获得最高权重
class_weights:
  enabled: true
  weights:
    0: 1.0
    1: 1.62
    2: 1.49
    3: 0.84
    4: 1.52
    5: 1.55
    6: 1.15
    7: 1.30
    8: 0.96
    9: 1.28
    10: 0.92
    11: 0.83
    12: 3.65
    13: 1.29
    14: 0.78
  method: inverse_frequency

# 数据增强配置 (渐进式策略)
augmentation:
  # HSV 颜色空间增强
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  
  # 几何变换
  degrees: 15.0
  translate: 0.1
  scale: 0.9
  shear: 3.0
  perspective: 0.0002
  flipud: 0.05
  fliplr: 0.5
  
  # 高级增强
  mosaic: 1.0
  mixup: 0.2
  copy_paste: 0.1
  erasing: 0.3

# 多阶段训练策略
phases:
  - name: warmup
    epochs: 15
    lr_factor: 0.1
    mosaic: 1.0
    mixup: 0.2
    description: "预热阶段，低学习率强增强"
    
  - name: aggressive
    epochs: 80
    lr_factor: 1.0
    mosaic: 1.0
    mixup: 0.2
    description: "激进训练，全学习率强增强"
    
  - name: stable
    epochs: 60
    lr_factor: 0.3
    mosaic: 0.5
    mixup: 0.1
    description: "稳定阶段，降低学习率和增强"
    
  - name: fine_tune
    epochs: 45
    lr_factor: 0.05
    mosaic: 0.0
    mixup: 0.0
    description: "精调阶段，关闭增强专注细节"

# 数据集配置
dataset:
  config: configs/wheat_disease.yaml
  oversample_minority: true
  minority_classes:
    - 12

# 输出配置
output:
  project: models
  name: wheat_disease_v7_optimized
  exist_ok: true

# 评估配置
evaluation:
  conf_threshold: 0.001
  iou_threshold: 0.7
  max_det: 300
