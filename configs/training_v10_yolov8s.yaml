# v10 YOLOv8s 训练配置
# 目标: mAP@50 >= 95%
# 基础模型: YOLOv8s (预训练权重)
# 策略: 使用更大的模型提升检测精度
# GPU限制: RTX 3050 Laptop (4GB显存)

model:
  base: "yolov8s.pt"
  input_size: 640

training:
  epochs: 150
  batch: 24
  imgsz: 640
  device: 0
  workers: 2
  amp: true
  cache: ram
  rect: false
  patience: 40
  save_period: 10

optimizer:
  type: "AdamW"
  lr0: 0.0005
  lrf: 0.1
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 5
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

loss:
  box: 7.5
  cls: 0.5
  dfl: 1.5

augmentation:
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.3
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 0.8
  mixup: 0.1
  copy_paste: 0.0
  erasing: 0.0

evaluation:
  conf_threshold: 0.001
  iou_threshold: 0.7
  max_det: 300

phases:
  - name: "phase1_warmup"
    epochs: 30
    lr_factor: 1.0
    mosaic: 0.8
    mixup: 0.1
    freeze_backbone: true
    description: "预热阶段，冻结骨干网络，强数据增强"
  - name: "phase2_finetune"
    epochs: 50
    lr_factor: 0.5
    mosaic: 0.5
    mixup: 0.05
    freeze_backbone: false
    description: "微调阶段，解冻骨干网络，中等增强"
  - name: "phase3_stable"
    epochs: 40
    lr_factor: 0.2
    mosaic: 0.2
    mixup: 0.0
    freeze_backbone: false
    description: "稳定阶段，弱增强"
  - name: "phase4_final"
    epochs: 30
    lr_factor: 0.1
    mosaic: 0.0
    mixup: 0.0
    freeze_backbone: false
    description: "最终阶段，关闭数据增强"

output:
  project: "models"
  name: "wheat_disease_v10_yolov8s"
  exist_ok: true
