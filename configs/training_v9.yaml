# v9 最终优化训练配置
# 目标: mAP@50 >= 95%
# 基础模型: wheat_disease_v5_optimized_phase2 (mAP@50 = 92.68%)
# 策略: 从最佳模型继续精细训练，使用更小的学习率和数据增强

model:
  base: "models/wheat_disease_v5_optimized_phase2/weights/best.pt"
  input_size: 640

training:
  epochs: 100
  batch: 4
  imgsz: 640
  device: 0
  workers: 4
  amp: true
  cache: false
  rect: false
  patience: 30
  save_period: 10

optimizer:
  type: "AdamW"
  lr0: 0.0001
  lrf: 0.1
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

loss:
  box: 7.5
  cls: 0.5
  dfl: 1.5

augmentation:
  hsv_h: 0.01
  hsv_s: 0.3
  hsv_v: 0.2
  degrees: 5.0
  translate: 0.05
  scale: 0.3
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 0.3
  mixup: 0.05
  copy_paste: 0.0
  erasing: 0.0

evaluation:
  conf_threshold: 0.001
  iou_threshold: 0.7
  max_det: 300

phases:
  - name: "fine_tune_1"
    epochs: 30
    lr_factor: 1.0
    mosaic: 0.3
    mixup: 0.05
    description: "精细调整阶段1，适度增强"
  - name: "fine_tune_2"
    epochs: 30
    lr_factor: 0.5
    mosaic: 0.1
    mixup: 0.0
    description: "精细调整阶段2，弱增强"
  - name: "final"
    epochs: 40
    lr_factor: 0.1
    mosaic: 0.0
    mixup: 0.0
    description: "最终阶段，关闭增强"

output:
  project: "models"
  name: "wheat_disease_v9_final"
  exist_ok: true
