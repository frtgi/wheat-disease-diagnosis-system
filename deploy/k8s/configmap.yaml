apiVersion: v1
kind: ConfigMap
metadata:
  name: iwdda-config
  namespace: iwdda
  labels:
    app: iwdda
data:
  # 应用配置
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_LOG_LEVEL: "info"
  
  # Neo4j 配置
  NEO4J_URI: "neo4j://neo4j-service:7687"
  NEO4J_DATABASE: "neo4j"
  
  # Redis 配置
  REDIS_URL: "redis://redis-service:6379"
  
  # MinIO 配置
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET: "models"
  
  # 模型配置
  MODEL_CACHE_DIR: "/cache/models"
  MAX_BATCH_SIZE: "32"
  
  # 性能配置
  INFERENCE_TIMEOUT: "30"
  MAX_CONCURRENT_REQUESTS: "100"
  
  # 训练配置
  TRAINING_DATASETS_DIR: "/datasets"
  TRAINING_RUNS_DIR: "/runs"
  TRAINING_BATCH_SIZE: "8"
  TRAINING_EPOCHS: "100"
