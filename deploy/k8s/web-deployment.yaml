apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-service
  namespace: iwdda
  labels:
    app: web-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-service
  template:
    metadata:
      labels:
        app: web-service
        version: v1
    spec:
      containers:
      - name: web
        image: iwdda/web:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7860
          name: http
        env:
        - name: API_URL
          value: "http://api-service:8000"
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: iwdda
  labels:
    app: web-service
spec:
  selector:
    app: web-service
  ports:
  - port: 7860
    targetPort: 7860
    name: http
    protocol: TCP
  type: ClusterIP
