[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

markers =
    slow: 标记运行较慢的测试
    integration: 标记集成测试
    unit: 标记单元测试
    e2e: 标记端到端测试
    api: 标记 API 测试
    db: 标记需要数据库的测试
    auth: 标记需要认证的测试
    ai: 标记需要 AI 模型的测试
    gpu: 标记需要 GPU 的测试

addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    -p no:warnings
    --cov=app
    --cov-report=term-missing
    --cov-report=html:tests/coverage_report
    --cov-report=xml:tests/coverage.xml
    --cov-fail-under=0
    --asyncio-mode=auto

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S

minversion = 7.0

asyncio_mode = auto
env_files =
    .env.test

testpaths_excludes =
    __pycache__
    .git
    .venv
    venv
    node_modules

xfail_strict = true

junit_family = xunit2
junit_logging = all
junit_log_passing_tests = true

[coverage:run]
source = app
branch = true
omit =
    app/main.py
    app/__init__.py
    */tests/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
show_missing = true
skip_covered = false
